server {
    listen 80;
    server_name plinkatron.com www.plinkatron.com;

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeout for Suno generation (can take 60-90s)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Serve generated audio directly (bypass Node for performance)
    location /generated/ {
        alias /var/www/plinkatron/generated/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /var/www/plinkatron/uploads/;
        expires 7d;
    }

    client_max_body_size 50M;
}
